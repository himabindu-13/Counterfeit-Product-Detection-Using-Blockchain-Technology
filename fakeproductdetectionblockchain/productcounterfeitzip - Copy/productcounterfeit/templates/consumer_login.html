{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="retro-card">
            <div class="retro-header">
                <h3>👤 Consumer Login</h3>
            </div>
            <div class="card-body p-4">
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form method="POST" action="{{ url_for('consumer_login', next=request.args.get('next')) }}">
                    <input type="hidden" name="next" value="{{ request.args.get('next', next) }}">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" placeholder="you@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-retro btn-compact btn-action">Login &amp; Verify</button>
                </form>
                <div class="d-flex justify-content-between align-items-center mt-3">
                    <a href="{{ url_for('forgot_password') }}" class="text-decoration-none neon-text">
                        Forgot password?
                    </a>
                    <a href="{{ url_for('register') }}" class="btn btn-outline-light btn-sm">
                        Register
                    </a>
                </div>
                <p class="text-muted small mt-3 mb-0">
                    Manufacturer or vendor? Contact the admin team for access.
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
